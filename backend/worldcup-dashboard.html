<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta http-equiv="X-UA-Compatible" content="IE=edge">
<title>2026 世界杯 AI 预测 & 体彩决策 Dashboard</title>
<style>
/* ============================================================
   CSS Custom Properties & Reset
   ============================================================ */
:root {
  --slate-900: #0f172a;
  --slate-800: #1e293b;
  --slate-750: #283548;
  --slate-700: #334155;
  --slate-600: #475569;
  --slate-500: #64748b;
  --slate-400: #94a3b8;
  --slate-300: #cbd5e1;
  --slate-200: #e2e8f0;
  --white: #ffffff;
  --emerald-500: #10b981;
  --emerald-400: #34d399;
  --emerald-300: #6ee7b7;
  --emerald-900: #064e3b;
  --red-500: #ef4444;
  --red-400: #f87171;
  --amber-400: #fbbf24;
  --amber-500: #f59e0b;
  --blue-400: #60a5fa;
  --blue-500: #3b82f6;
  --radius: 12px;
  --radius-sm: 8px;
  --radius-xs: 4px;
  --shadow: 0 4px 6px -1px rgba(0,0,0,0.3), 0 2px 4px -2px rgba(0,0,0,0.3);
}

*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

body {
  font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'PingFang SC', 'Microsoft YaHei', 'Helvetica Neue', sans-serif;
  background: var(--slate-900);
  color: var(--slate-200);
  min-height: 100vh;
  line-height: 1.5;
  -webkit-font-smoothing: antialiased;
}

/* ============================================================
   Scrollbar
   ============================================================ */
::-webkit-scrollbar { width: 6px; height: 6px; }
::-webkit-scrollbar-track { background: var(--slate-900); }
::-webkit-scrollbar-thumb { background: var(--slate-700); border-radius: 3px; }
::-webkit-scrollbar-thumb:hover { background: var(--slate-600); }

/* ============================================================
   Typography
   ============================================================ */
.font-mono, .mono {
  font-family: 'SF Mono', 'Cascadia Code', 'Consolas', 'Microsoft YaHei', monospace;
}

/* ============================================================
   Header
   ============================================================ */
.header {
  background: var(--slate-800);
  border-bottom: 1px solid var(--slate-700);
  padding: 16px 24px;
}
.header-inner {
  max-width: 1600px;
  margin: 0 auto;
  display: flex;
  align-items: center;
  justify-content: space-between;
}
.header-left { display: flex; align-items: center; gap: 12px; }
.header-logo {
  width: 40px; height: 40px; border-radius: var(--radius-sm);
  background: linear-gradient(135deg, var(--emerald-400), var(--emerald-500));
  display: flex; align-items: center; justify-content: center; font-size: 22px;
}
.header-title { font-size: 20px; font-weight: 700; color: var(--white); }
.glow-text { text-shadow: 0 0 20px rgba(16,185,129,0.5), 0 0 40px rgba(16,185,129,0.2); }
.header-sub { font-size: 12px; color: var(--slate-400); margin-top: 2px; }
.header-right { display: flex; align-items: center; gap: 16px; font-size: 13px; }
.badge-live {
  display: flex; align-items: center; gap: 6px;
  padding: 6px 12px; border-radius: 20px;
  background: rgba(16,185,129,0.1); border: 1px solid rgba(16,185,129,0.3);
  color: var(--emerald-400); font-size: 13px;
}
.badge-dot { width: 8px; height: 8px; border-radius: 50%; background: var(--emerald-400); }
.pulse { animation: pulse 2s infinite; }
@keyframes pulse {
  0%, 100% { opacity: 1; }
  50% { opacity: 0.3; }
}
.header-clock { color: var(--slate-400); }

/* ============================================================
   Main Layout (3 Columns)
   ============================================================ */
.main-layout {
  max-width: 1600px; margin: 0 auto; padding: 24px;
  display: flex; gap: 24px;
  height: calc(100vh - 90px);
}
.panel {
  display: flex; flex-direction: column; gap: 12px;
}
.panel-left { width: 320px; flex-shrink: 0; }
.panel-center { flex: 1; min-width: 0; overflow-y: auto; }
.panel-right { width: 320px; flex-shrink: 0; }

/* ============================================================
   Section Title
   ============================================================ */
.section-title {
  font-size: 13px; font-weight: 600; color: var(--slate-300);
  text-transform: uppercase; letter-spacing: 0.05em;
  display: flex; align-items: center; justify-content: space-between;
  margin-bottom: 4px;
}
.section-badge { font-size: 11px; color: var(--slate-500); }

/* ============================================================
   Card Base
   ============================================================ */
.card {
  background: var(--slate-800);
  border: 1px solid var(--slate-700);
  border-radius: var(--radius);
  padding: 16px;
}
.card-hover {
  cursor: pointer;
  transition: all 0.2s ease;
}
.card-hover:hover {
  transform: translateY(-2px);
  box-shadow: 0 8px 25px rgba(0,0,0,0.4);
  border-color: var(--slate-600);
}
.card.active {
  border-color: var(--emerald-500) !important;
  background: rgba(16,185,129,0.06);
}

/* ============================================================
   Match Card (Left Panel)
   ============================================================ */
.match-card { padding: 12px; }
.match-card-top {
  display: flex; align-items: center; justify-content: space-between; margin-bottom: 8px;
}
.match-time { font-size: 12px; color: var(--slate-400); }
.match-group {
  font-size: 11px; padding: 2px 6px; border-radius: var(--radius-xs);
  background: var(--slate-700); color: var(--slate-400);
}
.match-teams {
  display: flex; align-items: center; justify-content: space-between; margin-bottom: 8px;
}
.match-side { display: flex; align-items: center; gap: 8px; }
.match-flag { font-size: 28px; }
.match-name { font-size: 14px; font-weight: 500; color: var(--white); }
.match-vs { font-size: 12px; color: var(--slate-500); }
.match-bottom {
  display: flex; align-items: center; justify-content: space-between; font-size: 11px;
}
.match-handicap { color: var(--slate-500); }
.match-odds { display: flex; gap: 8px; }
.match-odds span { padding: 2px 6px; border-radius: var(--radius-xs); background: var(--slate-750); }
.odds-home, .odds-away { color: var(--slate-300); }
.odds-draw { color: var(--slate-500); }

/* ============================================================
   Buttons
   ============================================================ */
.btn {
  display: block; width: 100%; padding: 10px 16px;
  border-radius: var(--radius-sm); font-size: 13px; cursor: pointer;
  transition: all 0.2s; text-align: center;
  background: var(--slate-800); color: var(--slate-400);
  border: 1px solid var(--slate-700);
}
.btn:hover {
  color: var(--white);
  border-color: rgba(16,185,129,0.5);
}

/* ============================================================
   Empty State
   ============================================================ */
.empty-state {
  flex: 1; display: flex; align-items: center; justify-content: center;
  text-align: center; color: var(--slate-500);
}
.empty-state-icon { font-size: 60px; margin-bottom: 16px; }
.empty-state-title { font-size: 17px; margin-bottom: 4px; }
.empty-state-sub { font-size: 13px; }

/* ============================================================
   Loading Spinner
   ============================================================ */
.spinner {
  width: 32px; height: 32px;
  border: 2px solid var(--emerald-400);
  border-top-color: transparent;
  border-radius: 50%;
  animation: spin 0.8s linear infinite;
  margin: 0 auto;
}
@keyframes spin { to { transform: rotate(360deg); } }
.loading-wrap {
  flex: 1; display: flex; align-items: center; justify-content: center;
}

/* ============================================================
   Match Header (Center Panel)
   ============================================================ */
.match-header-card {
  background: linear-gradient(135deg, var(--slate-800), rgba(30,41,59,0.5));
  border: 1px solid var(--slate-700); border-radius: var(--radius); padding: 20px;
}
.match-header-teams {
  display: flex; align-items: center; justify-content: space-between;
}
.match-header-side { text-align: center; flex: 1; }
.match-header-flag { font-size: 56px; }
.match-header-name { font-size: 20px; font-weight: 700; color: var(--white); margin-top: 8px; }
.match-header-center { text-align: center; padding: 0 24px; }
.match-header-vs { font-size: 32px; font-weight: 800; color: var(--emerald-400); }
.match-header-info { font-size: 12px; color: var(--slate-500); margin-top: 4px; }

/* ============================================================
   Lineup Panel
   ============================================================ */
.lineup-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 16px; }
.lineup-card { padding: 16px; height: 100%; }
.lineup-title { display: flex; align-items: center; gap: 8px; margin-bottom: 12px; }
.lineup-title h4 { font-size: 14px; font-weight: 600; color: var(--white); }
.lineup-players { display: grid; grid-template-columns: 1fr 1fr; gap: 4px 12px; margin-bottom: 16px; }
.lineup-player {
  display: flex; align-items: center; gap: 6px; font-size: 12px; color: var(--slate-300);
}
.lineup-num {
  width: 20px; height: 20px; border-radius: 50%; background: var(--slate-700);
  display: flex; align-items: center; justify-content: center;
  font-size: 10px; color: var(--slate-400); flex-shrink: 0;
}
.injury-section { border-top: 1px solid var(--slate-700); padding-top: 12px; }
.injury-title { font-size: 12px; color: var(--slate-400); margin-bottom: 8px; }
.injury-item { display: flex; align-items: center; gap: 8px; font-size: 12px; padding: 4px 0; }
.injury-dot { width: 6px; height: 6px; border-radius: 50%; flex-shrink: 0; }
.injury-dot.critical { background: var(--red-500); }
.injury-dot.warning { background: var(--amber-500); }
.injury-name { font-weight: 600; }
.injury-name.critical { color: var(--red-400); }
.injury-name.warning { color: var(--amber-400); }
.injury-status { opacity: 0.7; }
.injury-name.critical + .injury-status { color: var(--red-400); }
.injury-name.warning + .injury-status { color: var(--amber-400); }
.injury-clean { font-size: 12px; color: var(--slate-500); border-top: 1px solid var(--slate-700); padding-top: 12px; }

/* ============================================================
   H2H Panel
   ============================================================ */
.h2h-summary { display: flex; align-items: center; gap: 16px; font-size: 12px; margin-bottom: 12px; }
.h2h-summary .win { color: var(--emerald-400); }
.h2h-summary .draw-count { color: var(--slate-400); }
.h2h-summary .lose { color: var(--blue-400); }
.h2h-row {
  display: flex; align-items: center; justify-content: space-between;
  background: rgba(51,65,85,0.5); border-radius: var(--radius-sm);
  padding: 8px 12px; font-size: 13px; margin-bottom: 6px;
}
.h2h-date { font-size: 12px; color: var(--slate-400); width: 100px; flex-shrink: 0; }
.h2h-matchup { display: flex; align-items: center; gap: 12px; flex: 1; justify-content: center; }
.h2h-home-name { width: 80px; text-align: right; }
.h2h-away-name { width: 80px; text-align: left; }
.h2h-score { font-weight: 700; width: 50px; text-align: center; color: var(--white); }
.h2h-venue { font-size: 12px; color: var(--slate-500); width: 100px; text-align: right; flex-shrink: 0; }
.h2h-win { color: var(--emerald-400) !important; font-weight: 700 !important; }
.h2h-lose { color: var(--emerald-400) !important; font-weight: 700 !important; }

/* ============================================================
   AI Prediction
   ============================================================ */
.ai-grid { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 12px; margin-bottom: 12px; }
.ai-cell {
  text-align: center; padding: 10px; border-radius: var(--radius-sm);
  background: rgba(51,65,85,0.5);
}
.ai-cell-label { font-size: 12px; color: var(--slate-400); }
.ai-cell-val { font-size: 18px; font-weight: 700; margin-top: 2px; }
.ai-cell-val.home { color: var(--emerald-400); }
.ai-cell-val.draw { color: var(--amber-400); }
.ai-cell-val.away { color: var(--blue-400); }
.ai-lambda { font-size: 12px; color: var(--slate-500); }
.ai-chart-wrap { height: 200px; margin-top: 8px; }
.ai-note { font-size: 11px; color: var(--slate-500); margin-top: 8px; }

/* 比分预测 */
.score-predict { margin-top: 16px; border-top: 1px solid var(--slate-700); padding-top: 16px; }
.score-predict-title { font-weight: 600; color: var(--white); margin-bottom: 12px; display: flex; align-items: center; gap: 6px; }
.score-row { display: flex; align-items: center; gap: 10px; margin-bottom: 8px; }
.score-num { width: 42px; text-align: center; font-weight: 700; font-size: 15px; flex-shrink: 0; }
.score-num.top1 { color: var(--emerald-400); }
.score-num.other { color: var(--slate-300); }
.score-bar-wrap { flex: 1; height: 22px; background: var(--slate-750); border-radius: 6px; overflow: hidden; position: relative; }
.score-bar-fill { height: 100%; border-radius: 6px; transition: width 0.5s ease; }
.score-bar-fill.top1 { background: linear-gradient(90deg, rgba(16,185,129,0.6), rgba(16,185,129,0.9)); }
.score-bar-fill.other { background: linear-gradient(90deg, rgba(100,116,139,0.4), rgba(100,116,139,0.7)); }
.score-pct { width: 52px; text-align: right; font-size: 13px; font-weight: 600; flex-shrink: 0; }
.score-pct.top1 { color: var(--emerald-400); }
.score-pct.other { color: var(--slate-400); }

/* 预期进球 & 大小球 */
.score-extra { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-top: 14px; }
.score-extra-item { background: var(--slate-750); border-radius: var(--radius-sm); padding: 10px 12px; text-align: center; }
.score-extra-label { font-size: 11px; color: var(--slate-400); }
.score-extra-val { font-size: 18px; font-weight: 700; color: var(--white); margin-top: 2px; }
.score-extra-sub { font-size: 11px; color: var(--slate-500); margin-top: 2px; }

/* ============================================================
   Betting Panel (Right)
   ============================================================ */
.odds-row {
  background: rgba(51,65,85,0.5); border-radius: var(--radius-sm); padding: 12px;
  margin-bottom: 8px;
}
.odds-row.recommended { border: 1px solid rgba(16,185,129,0.3); }
.odds-row-top { display: flex; align-items: center; justify-content: space-between; margin-bottom: 4px; }
.odds-row-label { font-size: 14px; font-weight: 500; color: var(--white); }
.odds-row-price { font-size: 12px; color: var(--slate-400); }
.odds-row-price val { color: var(--white); }
.odds-row-stats { display: flex; align-items: center; justify-content: space-between; font-size: 11px; }
.odds-row-stats span { color: var(--slate-500); }
.odds-row-stats .val { color: var(--slate-300); }
.edge-positive { color: var(--emerald-400) !important; }
.edge-negative { color: var(--red-400) !important; }

/* Kelly Decision */
.kelly-card { padding: 16px; }
.kelly-card.recommend {
  border: 1px solid rgba(16,185,129,0.5);
  box-shadow: 0 0 0 0 rgba(16,185,129,0.4);
  animation: pulseBorder 2s infinite;
}
@keyframes pulseBorder {
  0%, 100% { box-shadow: 0 0 0 0 rgba(16,185,129,0.4); }
  50% { box-shadow: 0 0 0 4px rgba(16,185,129,0); }
}
.kelly-recommend-item {
  background: rgba(16,185,129,0.08); border: 1px solid rgba(16,185,129,0.3);
  border-radius: var(--radius-sm); padding: 16px; margin-bottom: 12px;
}
.kelly-recommend-header { display: flex; align-items: center; gap: 8px; margin-bottom: 8px; }
.kelly-recommend-badge { font-size: 18px; }
.kelly-recommend-label { color: var(--emerald-400); font-weight: 700; font-size: 17px; }
.kelly-recommend-play { color: var(--white); font-weight: 600; margin-bottom: 8px; }
.kelly-stats { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; font-size: 11px; }
.kelly-stat {
  background: rgba(51,65,85,0.5); border-radius: var(--radius-sm); padding: 8px;
}
.kelly-stat-label { color: var(--slate-400); }
.kelly-stat-val { color: var(--emerald-400); font-weight: 700; font-size: 15px; margin-top: 2px; }
.kelly-note { font-size: 11px; color: var(--slate-400); margin-top: 8px; }

.kelly-pass {
  text-align: center; padding: 24px 16px;
}
.kelly-pass-icon { font-size: 48px; }
.kelly-pass-title { color: var(--slate-400); font-weight: 600; margin-top: 8px; }
.kelly-pass-sub { font-size: 12px; color: var(--slate-500); margin-top: 4px; }

.kelly-miss-list { border-top: 1px solid var(--slate-700); padding-top: 12px; margin-top: 12px; }
.kelly-miss-title { font-size: 12px; color: var(--slate-500); }
.kelly-miss-row { display: flex; align-items: center; justify-content: space-between; font-size: 12px; margin-top: 4px; }
.kelly-miss-row span:first-child { color: var(--slate-400); }
.kelly-miss-row .edge-bad { color: var(--red-400); }

/* ============================================================
   Animations
   ============================================================ */
.slide-in { animation: slideIn 0.3s ease-out; }
@keyframes slideIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }

/* ============================================================
   Error Notice
   ============================================================ */
.cdn-error-banner {
  position: fixed; top: 0; left: 0; right: 0; z-index: 9999;
  background: var(--red-500); color: white; padding: 10px 16px;
  font-size: 13px; text-align: center; line-height: 1.6;
}

/* ============================================================
   Overflow / Scroll
   ============================================================ */
.scroll-y { overflow-y: auto; }
.flex-1 { flex: 1; }
.hidden { display: none !important; }
</style>
</head>
<body>

<!-- ========== 顶部导航栏 ========== -->
<header class="header">
  <div class="header-inner">
    <div class="header-left">
      <div class="header-logo">⚽</div>
      <div>
        <div class="header-title glow-text">2026 美洲世界杯 · AI 预测 Dashboard</div>
        <div class="header-sub">泊松分布模型 × 凯利公式决策 · Mock Data Mode</div>
      </div>
    </div>
    <div class="header-right">
      <span id="modeBadge" class="badge-live">
        <span class="badge-dot pulse"></span><span id="modeText">数据实时更新中</span>
      </span>
      <span id="currentTime" class="header-clock font-mono"></span>
    </div>
  </div>
</header>

<!-- ========== 三栏主布局 ========== -->
<div class="main-layout">

  <!-- 左栏：今日比赛列表 -->
  <aside class="panel panel-left">
    <div class="section-title">
      <span>📅 今日比赛</span>
      <div style="display:flex;align-items:center;gap:8px">
        <span id="matchCount" class="section-badge">0 场</span>
        <button id="editOddsBtn" onclick="toggleEditOdds()" style="font-size:11px;padding:2px 8px;border-radius:4px;background:var(--slate-700);color:var(--slate-400);border:1px solid var(--slate-600);cursor:pointer">✏️ 编辑赔率</button>
      </div>
    </div>
    <div id="matchList" class="scroll-y flex-1" style="display:flex;flex-direction:column;gap:8px;">
      <div style="display:flex;flex-direction:column;gap:8px;">
        <div class="card" style="height:96px;animation:pulse 1.5s infinite;"></div>
        <div class="card" style="height:96px;animation:pulse 1.5s infinite 0.2s;"></div>
        <div class="card" style="height:96px;animation:pulse 1.5s infinite 0.4s;"></div>
        <div class="card" style="height:96px;animation:pulse 1.5s infinite 0.6s;"></div>
      </div>
    </div>
    <button id="refreshBtn" class="btn" onclick="refreshMatches()">🔄 刷新比赛数据</button>
  </aside>

  <!-- 中栏：赛前情报 + AI预测 -->
  <section class="panel panel-center">
    <div id="centerEmpty" class="empty-state">
      <div>
        <div class="empty-state-icon">⚽</div>
        <div class="empty-state-title">← 请从左侧选择一场比赛查看详情</div>
        <div class="empty-state-sub">点击比赛卡片即可加载 AI 预测与情报</div>
      </div>
    </div>
    <div id="centerContent" class="hidden" style="display:flex;flex-direction:column;gap:16px;flex:1;">
      <div id="matchHeader"></div>
      <div class="lineup-grid">
        <div id="homeLineupPanel"></div>
        <div id="awayLineupPanel"></div>
      </div>
      <div id="h2hPanel"></div>
      <div id="aiPanel"></div>
    </div>
  </section>

  <!-- 右栏：最佳体彩方案 -->
  <aside class="panel panel-right">
    <div class="section-title">🎯 最佳体彩方案</div>
    <div id="bettingEmpty" class="empty-state">
      <div>
        <div class="empty-state-icon">📊</div>
        <div class="empty-state-title">选择比赛后</div>
        <div class="empty-state-sub">自动计算投注建议</div>
      </div>
    </div>
    <div id="bettingContent" class="hidden scroll-y flex-1" style="display:flex;flex-direction:column;gap:12px;">
      <div id="oddsCompare"></div>
      <div id="kellyDecision"></div>
    </div>
  </aside>
</div>

<script>
/* ===================================================================
 *  全局状态
 * =================================================================== */
var currentMatchId = null;
var matchesData = [];
var aiChart = null;
var renderGen = 0;

/* ===================================================================
 *  更新时间显示
 * =================================================================== */
function updateClock() {
  var now = new Date();
  document.getElementById('currentTime').textContent =
    now.toLocaleDateString('zh-CN', { year:'numeric', month:'2-digit', day:'2-digit' }) + ' ' +
    now.toLocaleTimeString('zh-CN', { hour:'2-digit', minute:'2-digit', second:'2-digit' });
}
updateClock();
setInterval(updateClock, 1000);

// 数据模式指示
(function() {
  var badge = document.getElementById('modeBadge');
  var text = document.getElementById('modeText');
  if (USE_MOCK) {
    badge.style.background = 'rgba(251,191,36,0.1)';
    badge.style.borderColor = 'rgba(251,191,36,0.3)';
    badge.querySelector('.badge-dot').style.background = '#fbbf24';
    text.textContent = '离线 Mock 模式';
  } else if (API_BASE === '') {
    fetch(API_BASE + '/api/status').then(function(r) { return r.json(); }).then(function(s) {

 *   - 从 http:// 加载 → 同源模式，API_BASE = ''（适合公网分享）
 *   - 从 file:// 加载 → 本地模式，API_BASE = 'http://localhost:8000'
 *   - USE_MOCK = true  → 离线模式，使用内嵌数据
 */
var USE_MOCK = false;

var API_BASE = (window.location.protocol === 'file:')
  ? 'http://localhost:8000'
  : '';

function fetchData(url, options) {
  options = options || {};

  // 离线模式：使用内嵌 Mock 数据
  if (USE_MOCK) {
    return new Promise(function(resolve) {
      setTimeout(function() {
        if (url === '/api/matches') {
          resolve(JSON.parse(JSON.stringify(MOCK_MATCHES)));
        } else {
          var m = url.match(/\/api\/match\/(\d+)/);
          if (m) {
            var detail = MOCK_MATCH_DETAILS[parseInt(m[1])];
            if (!detail) throw new Error('Match not found');
            resolve(JSON.parse(JSON.stringify(detail)));
          } else {
            throw new Error('Unknown endpoint: ' + url);
          }
        }
      }, 200 + Math.random() * 300);
    });
  }

  // 真实 API 模式：请求 FastAPI 后端
  var fetchOpts = { method: options.method || 'GET' };
  var headers = { 'Content-Type': 'application/json' };
  if (options.headers) {
    var keys = Object.keys(options.headers);
    for (var h = 0; h < keys.length; h++) { headers[keys[h]] = options.headers[keys[h]]; }
  }
  fetchOpts.headers = headers;
  if (options.body) { fetchOpts.body = JSON.stringify(options.body); }

  return fetch(API_BASE + url, fetchOpts).then(function(resp) {
    if (!resp.ok) throw new Error('HTTP ' + resp.status);
    return resp.json();
  }).catch(function(err) {
    console.error('[fetchData] error:', err.message);
    throw err;
  });
}

/* ===================================================================
 *  泊松分布模型 —— AI 预测引擎
 *
 *  公式: P(k; λ) = (λ^k * e^(-λ)) / k!
 *  λ (lambda) = 预期进球数
 *  通过计算 0~MAX_GOALS 球的所有比分概率矩阵，汇总胜/平/负概率
 * =================================================================== */
var MAX_GOALS = 8;
var LEAGUE_AVG = 1.0;

function poissonProb(lambda, k) {
  if (lambda <= 0) return k === 0 ? 1 : 0;
  var logP = -lambda + k * Math.log(lambda);
  for (var i = 2; i <= k; i++) logP -= Math.log(i);
  return Math.exp(logP);
}

function calcMatchProbs(homeAttack, awayAttack, homeDefense, awayDefense) {
  var lambdaHome = homeAttack * awayDefense / LEAGUE_AVG;
  var lambdaAway = awayAttack * homeDefense / LEAGUE_AVG;
  var homeProb = 0, drawProb = 0, awayProb = 0;
  var scoreList = []; // 收集所有比分概率

  for (var i = 0; i <= MAX_GOALS; i++) {
    for (var j = 0; j <= MAX_GOALS; j++) {
      var p = poissonProb(lambdaHome, i) * poissonProb(lambdaAway, j);
      scoreList.push({ home: i, away: j, prob: p });
      if (i > j) homeProb += p;
      else if (i === j) drawProb += p;
      else awayProb += p;
    }
  }

  // 按概率降序排列，取 Top 5 比分
  scoreList.sort(function(a, b) { return b.prob - a.prob; });
  var topScores = scoreList.slice(0, 5);

  // 计算大小球概率（以 2.5 球为界）
  var over25 = 0;
  for (var k = 0; k < scoreList.length; k++) {
    if (scoreList[k].home + scoreList[k].away > 2.5) over25 += scoreList[k].prob;
  }

  return {
    homeWin: homeProb, draw: drawProb, awayWin: awayProb,
    lambdaHome: lambdaHome.toFixed(2), lambdaAway: lambdaAway.toFixed(2),
    topScores: topScores,
    expectedGoals: (lambdaHome + lambdaAway).toFixed(2),
    over25: over25, under25: 1 - over25
  };
}

/* ===================================================================
 *  让球胜平负 (RQSPF) 概率计算
 *
 *  盘口示例: "阿根廷 -0.5" → home 让 0.5 球
 *  解析盘口字符串，再用泊松比分矩阵计算让球后的胜平负概率
 * =================================================================== */

function parseHandicap(handicapStr, homeTeam, awayTeam) {
  // 解析让球盘口，返回 {side: 'home'|'away', value: float}
  // "阿根廷 -0.5" → 阿根廷是主队 → {side:'home', value:0.5}
  // "苏格兰 -1"  → 苏格兰是客队 → {side:'away', value:1}
  // "平手"       → {side:'home', value:0}
  if (!handicapStr || handicapStr === '平手') return {side:'home', value:0};

  // 提取队名和盘口值
  // 格式: "某队 -0.5" 或 "某队 +1" 或 "某队 -0.5/1"
  var match = handicapStr.match(/^(.+?)\s*([-+])\s*([\d./]+)$/);
  if (!match) return {side:'home', value:0};

  var teamInStr = match[1].trim();
  var sign = match[2];
  var valStr = match[3];

  // 解析数值
  var val = 0;
  if (valStr.indexOf('/') >= 0) {
    var parts = valStr.split('/');
    val = (parseFloat(parts[0]) + parseFloat(parts[1])) / 2;
  } else {
    val = parseFloat(valStr);
  }
  if (isNaN(val)) val = 0;

  // 判断让球方是主队还是客队
  var side = 'home';
  if (sign === '-') {
    // 队名 -X 表示该队让球
    // 如果队名匹配客队 → away让球
    if (awayTeam && teamInStr.indexOf(awayTeam) >= 0) {
      side = 'away';
    }
    // 如果队名匹配主队 → home让球 (默认)
  } else if (sign === '+') {
    // 队名 +X 表示该队受让，对方让球
    if (homeTeam && teamInStr.indexOf(homeTeam) >= 0) {
      side = 'away';  // 主队受让 → 客队让球
    } else {
      side = 'home';  // 客队受让 → 主队让球
    }
  }

  return {side: side, value: val};
}

function calcHandicapProbs(homeAttack, awayAttack, homeDefense, awayDefense, handicapStr, homeTeam, awayTeam) {
  // 基于泊松分布计算让球后的胜平负概率
  var hc = parseHandicap(handicapStr, homeTeam, awayTeam);
  if (hc.value === 0) {
    // 平手盘等同于普通胜平负
    var base = calcMatchProbs(homeAttack, awayAttack, homeDefense, awayDefense);
    return {homeWin: base.homeWin, draw: base.draw, awayWin: base.awayWin};
  }

  var lambdaHome = homeAttack * awayDefense / LEAGUE_AVG;
  var lambdaAway = awayAttack * homeDefense / LEAGUE_AVG;

  var homeProb = 0, drawProb = 0, awayProb = 0;

  // 如果 side='home'（主队让球）:
  //   让球主胜 = P(home - away > handicap)
  //   让球平   = P(home - away == handicap)
  //   让球客胜 = P(home - away < handicap)
  // 如果 side='away'（客队让球/主队受让）:
  //   让球主胜 = P(home - away > -handicap)
  //   让球平   = P(home - away == -handicap)
  //   让球客胜 = P(home - away < -handicap)

  var threshold = hc.side === 'home' ? hc.value : -hc.value;

  if (threshold === Math.floor(threshold)) {
    // 整数盘口：可能平局
    var target = Math.round(threshold);
    for (var i = 0; i <= MAX_GOALS; i++) {
      for (var j = 0; j <= MAX_GOALS; j++) {
        var p = poissonProb(lambdaHome, i) * poissonProb(lambdaAway, j);
        var diff = i - j;
        if (diff > target) homeProb += p;
        else if (diff === target) drawProb += p;
        else awayProb += p;
      }
    }
  } else {
    // 半球盘口：无平局
    for (var i2 = 0; i2 <= MAX_GOALS; i2++) {
      for (var j2 = 0; j2 <= MAX_GOALS; j2++) {
        var p2 = poissonProb(lambdaHome, i2) * poissonProb(lambdaAway, j2);
        if ((i2 - j2) > threshold) homeProb += p2;
        else awayProb += p2;
      }
    }
  }

  return {homeWin: homeProb, draw: drawProb, awayWin: awayProb};
}

/* ===================================================================
 *  凯利公式 —— 最优投注决策引擎
 *
 *  凯利比例: f = (p * b - q) / b
 *    p = AI 预测概率, b = 净赔率 (decimal_odds - 1), q = 1 - p
 *  Edge(优势): Edge = p_ai - p_implied, 若 Edge > 0 有正期望值
 *  使用 1/4 凯利 (Fractional Kelly) 控制风险
 * =================================================================== */
var KELLY_FRACTION = 0.25;

function calcKelly(aiProb, decimalOdds) {
  var p = aiProb;
  var b = decimalOdds - 1;
  var q = 1 - p;

  if (b <= 0) return { edge: -1, kelly: 0, stake: 0, recommendation: 'invalid' };

  var pImplied = 1 / decimalOdds;
  var edge = p - pImplied;
  var kelly = (p * b - q) / b;
  var stake = Math.max(0, kelly * KELLY_FRACTION);

  var recommendation;
  if (edge > 0.03) recommendation = 'strong_buy';
  else if (edge > 0) recommendation = 'buy';
  else recommendation = 'pass';

  return { aiProb: p, impliedProb: pImplied, edge: edge, kelly: kelly, stake: stake, recommendation: recommendation, odds: decimalOdds };
}

function el(id) { return document.getElementById(id); }

}

function selectMatch(id) {
  currentMatchId = id;

  // 高亮选中卡片
  var cards = document.querySelectorAll('.match-card');
  for (var i = 0; i < cards.length; i++) cards[i].classList.remove('active');
  var activeCard = document.querySelector('.match-card[data-match-id="' + id + '"]');
  if (activeCard) activeCard.classList.add('active');

  // 显示加载
  el('centerEmpty').classList.add('hidden');
  el('bettingEmpty').classList.add('hidden');
  var cc = el('centerContent');
  var bc = el('bettingContent');
  cc.classList.remove('hidden');
  bc.classList.remove('hidden');
  cc.style.display = 'flex';
  bc.style.display = 'flex';

  if (aiChart) { try { aiChart.destroy(); } catch(e) {} aiChart = null; }

  cc.innerHTML = '<div class="loading-wrap"><div class="spinner"></div></div>';
  bc.innerHTML = '<div class="loading-wrap"><div class="spinner"></div></div>';

  var match = null;
  for (var i = 0; i < matchesData.length; i++) {
    if (matchesData[i].id === id) { match = matchesData[i]; break; }
  }

  fetchData('/api/match/' + id).then(function(detail) {
    cc.innerHTML =
      '<div id="matchHeader" class="slide-in"></div>' +
      '<div class="lineup-grid">' +
        '<div id="homeLineupPanel" class="slide-in"></div>' +
        '<div id="awayLineupPanel" class="slide-in"></div>' +
      '</div>' +
      '<div id="h2hPanel" class="slide-in"></div>' +
      '<div id="aiPanel" class="slide-in"></div>';
    bc.innerHTML =
      '<div id="oddsCompare" class="slide-in"></div>' +
      '<div id="kellyDecision" class="slide-in"></div>' +
      '<div id="handicapPanel" class="slide-in"></div>';

    renderMatchHeader(match);
    renderLineupPanel('home', match.homeTeam, match.homeFlag, detail.homeLineup, detail.homeInjuries);
    renderLineupPanel('away', match.awayTeam, match.awayFlag, detail.awayLineup, detail.awayInjuries);
    renderH2H(match, detail.h2h);
    renderAIChart(match, detail);
    renderBettingPanel(match, detail);
  }).catch(function(err) {
    cc.innerHTML = '<div class="loading-wrap" style="color:#f87171;">加载失败: ' + err.message + '</div>';
  });
}

  var rowsHtml = '';
  for (var j = 0; j < h2h.length; j++) {

        '<span class="h2h-date font-mono">' + h.date + '</span>' +

          '<span class="h2h-score font-mono">' + h.homeScore + ' - ' + h.awayScore + '</span>' +

function renderBettingPanel(match, detail) {
  return fetchPredict(detail.homeAttack, detail.awayAttack, detail.homeDefense, detail.awayDefense).then(function(probs) {

  var outcomes = [
    { label: match.homeTeam + ' 胜', aiProb: probs.homeWin, odds: match.homeOdds },
    { label: '平局', aiProb: probs.draw, odds: match.drawOdds },
    { label: match.awayTeam + ' 胜', aiProb: probs.awayWin, odds: match.awayOdds }

  return Promise.all(outcomes.map(function(o) {
    return fetchKelly(o.aiProb, o.odds).then(function(k) {
      k.label = o.label;
      return k;

  })).then(function(kellyResults) {

  var hasRecommendation = false;

    var k = kellyResults[j];
    var edgeClass = k.edge > 0 ? 'edge-positive' : 'edge-negative';

    var recClass = k.recommendation !== 'pass' ? ' recommended' : '';
    oddsHtml +=
      '<div class="odds-row' + recClass + '">' +
        '<div class="odds-row-top">' +
          '<span class="odds-row-label">' + k.label + '</span>' +
          '<span class="odds-row-price">赔率 <val class="font-mono">' + k.odds.toFixed(2) + '</val></span>' +
        '</div>' +
        '<div class="odds-row-stats">' +
          '<span>AI概率 <span class="val font-mono">' + (k.aiProb * 100).toFixed(1) + '%</span></span>' +
          '<span>隐含 <span class="val font-mono">' + (k.impliedProb * 100).toFixed(1) + '%</span></span>' +
          '<span class="' + edgeClass + ' font-mono" style="font-weight:600;">Edge: ' + edgePrefix + (k.edge * 100).toFixed(1) + '%</span>' +
        '</div>' +
      '</div>';
  }
  el('oddsCompare').innerHTML =
    '<div class="card">' +
      '<h4 style="font-weight:600;color:var(--white);margin-bottom:12px;">💰 赔率 × AI 概率对比</h4>' +
      oddsHtml +
    '</div>';

  // 凯利决策
  var decisionHtml = '';
  if (hasRecommendation) {
    for (var m = 0; m < kellyResults.length; m++) {
      var kr = kellyResults[m];
      if (kr.recommendation === 'pass') continue;
      decisionHtml +=
        '<div class="kelly-recommend-item">' +
          '<div class="kelly-recommend-header">' +
            '<span class="kelly-recommend-badge">✅</span>' +

          '</div>' +
          '<div class="kelly-recommend-play">' + kr.label + '</div>' +
          '<div class="kelly-stats">' +
            '<div class="kelly-stat"><div class="kelly-stat-label">预期优势 Edge</div><div class="kelly-stat-val font-mono">+' + (kr.edge * 100).toFixed(1) + '%</div></div>' +
            '<div class="kelly-stat"><div class="kelly-stat-label">建议仓位 (1/4凯利)</div><div class="kelly-stat-val font-mono">' + (kr.stake * 100).toFixed(1) + '%</div></div>' +
          '</div>' +
          '<div class="kelly-note">凯利比例: ' + (kr.kelly * 100).toFixed(1) + '% → 四分之一仓位: ' + (kr.stake * 100).toFixed(1) + '%</div>' +
        '</div>';
    }
    // 无价值结果
    var missList = '';
    for (var n = 0; n < kellyResults.length; n++) {
      if (kellyResults[n].recommendation !== 'pass') continue;
      missList +=
        '<div class="kelly-miss-row">' +
          '<span>' + kellyResults[n].label + '</span>' +
          '<span class="edge-bad font-mono">Edge: ' + (kellyResults[n].edge * 100).toFixed(1) + '%</span>' +
        '</div>';
    }
    if (missList) {

        '<div class="kelly-miss-list">' +

    decisionHtml =
      '<div class="kelly-pass">' +
        '<div class="kelly-pass-icon">🚫</div>' +
        '<div class="kelly-pass-title">【放弃本场】</div>' +

        '<div class="kelly-pass-sub">庄家赔率已充分反映真实概率</div>' +
      '</div>';
  }

  el('kellyDecision').innerHTML =
    '<div class="card kelly-card' + (hasRecommendation ? ' recommend' : '') + '">' +

      decisionHtml +

  // 让球胜平负分析
  renderHandicapPanel(match, detail, probs);
  });  // end of Promise.all for kelly
  });  // end of fetchPredict.then()
}

function renderHandicapPanel(match, detail, probs) {
  var hc = parseHandicap(match.handicap, match.homeTeam, match.awayTeam);
  if (hc.value === 0) {
    var hp0 = document.getElementById('handicapPanel');
    if (hp0) hp0.innerHTML = '';
    return;
  }

  // 加载已保存的让球赔率（从后端配置）
  var savedOdds = match._handicapOdds || null;

  var hProbs = calcHandicapProbs(detail.homeAttack, detail.awayAttack, detail.homeDefense, detail.awayDefense, match.handicap, match.homeTeam, match.awayTeam);

  // 赔率：优先用已保存的，否则估算
  var adj = 1 + Math.abs(hc.value) * 0.3;
  var hOdds = savedOdds ? savedOdds.homeOdds : Math.max(1.15, Math.round((hc.side === 'home' ? match.homeOdds * adj : match.homeOdds / adj) * 100) / 100);
  var dOdds = savedOdds ? savedOdds.drawOdds : (hc.value % 1 === 0 ? Math.round((3.0 + Math.abs(hc.value) * 0.5) * 100) / 100 : 0);
  var aOdds = savedOdds ? savedOdds.awayOdds : Math.max(1.15, Math.round((hc.side === 'home' ? match.awayOdds / adj : match.awayOdds * adj) * 100) / 100);
  if (hc.value % 1 !== 0 && !savedOdds) dOdds = 0; // 半球盘无平

  var sideLabel = hc.side === 'home' ? match.homeTeam : match.awayTeam;
  var hcDesc = hc.value > 0 ? (sideLabel + ' -' + hc.value) : (sideLabel + ' +' + hc.value);

  // 标签用队名（而非"让球主胜/客胜"）
  var homeLabel, drawLabel, awayLabel;
  if (hc.side === 'home') {
    // 主队让球
    homeLabel = match.homeTeam + ' 让球胜';
    drawLabel = '让球平';
    awayLabel = match.awayTeam + ' 受让胜';
  } else {
    // 客队让球 → 主队受让
    homeLabel = match.homeTeam + ' 受让胜';
    drawLabel = '让球平';
    awayLabel = match.awayTeam + ' 让球胜';
  }

  var outcomes = [
    { label: homeLabel, aiProb: hProbs.homeWin, odds: hOdds, key: 'homeOdds' },
    { label: drawLabel,  aiProb: hProbs.draw,    odds: dOdds || null, key: 'drawOdds' },
    { label: awayLabel,  aiProb: hProbs.awayWin, odds: aOdds, key: 'awayOdds' }
  ];

  var hKelly = [];
  for (var i = 0; i < outcomes.length; i++) {
    var o = outcomes[i];
    if (!o.odds) continue;
    var k = calcKelly(o.aiProb, o.odds);
    k.label = o.label;
    k.key = o.key;
    hKelly.push(k);
  }

  var hasHRec = false;
  for (var j = 0; j < hKelly.length; j++) {
    if (hKelly[j].recommendation !== 'pass') { hasHRec = true; break; }
  }

  var hRows = '';
  for (var m = 0; m < hKelly.length; m++) {
    var hk = hKelly[m];
    var edgeCls = hk.edge > 0 ? 'edge-positive' : 'edge-negative';
    var oddsCell = editMode
      ? '<input id="hco' + match.id + '_' + hk.key + '" value="' + hk.odds.toFixed(2) + '" onchange="saveHandicapOdds(' + match.id + ')" size="5" style="width:60px;background:#1e293b;color:#fbbf24;border:1px solid #10b981;border-radius:3px;font-size:13px;padding:2px 4px;text-align:center">'
      : ('<val class="font-mono">' + hk.odds.toFixed(2) + '</val>');
    hRows +=
      '<div class="odds-row' + (hk.recommendation !== 'pass' ? ' recommended' : '') + '">' +
        '<div class="odds-row-top">' +
          '<span class="odds-row-label">' + hk.label + '</span>' +
          '<span class="odds-row-price">赔率 ' + oddsCell + '</span>' +
        '</div>' +
        '<div class="odds-row-stats">' +
          '<span>概率 <span class="val font-mono">' + (hk.aiProb * 100).toFixed(1) + '%</span></span>' +
          '<span class="' + edgeCls + ' font-mono" style="font-weight:600">Edge: ' + (hk.edge > 0 ? '+' : '') + (hk.edge * 100).toFixed(1) + '%</span>' +
        '</div>' +
      '</div>';
  }

  var bestBet = '';
  if (hasHRec) {
    for (var n = 0; n < hKelly.length; n++) {
      if (hKelly[n].recommendation !== 'pass') {
        bestBet += '<div style="color:#34d399;font-weight:600;font-size:14px;margin-bottom:4px">✅ 推荐: ' + hKelly[n].label + ' (仓位 ' + (hKelly[n].stake * 100).toFixed(1) + '%)</div>';
      }
    }
  } else {
    bestBet = '<div style="color:#94a3b8;font-size:13px">🚫 让球盘口无正期望值</div>';
  }

  var hp = document.getElementById('handicapPanel');
  hp.innerHTML =
    '<div class="card" style="margin-top:12px;border:1px solid rgba(245,158,11,0.3)">' +
      '<h4 style="font-weight:600;color:#fbbf24;margin-bottom:8px">🎯 让球胜平负 | ' + hcDesc + '</h4>' +
      '<p style="font-size:11px;color:#94a3b8;margin-bottom:8px">' + (editMode ? '点击赔率直接修改，输入后自动保存' : '让球赔率为估算值，点编辑赔率可修改') + '</p>' +
      hRows +
      '<div style="margin-top:10px;padding:10px;background:#1e293b;border-radius:8px">' + bestBet + '</div>' +
    '</div>';
}

function saveHandicapOdds(matchId) {
  var homeEl = document.getElementById('hco' + matchId + '_homeOdds');
  var drawEl = document.getElementById('hco' + matchId + '_drawOdds');
  var awayEl = document.getElementById('hco' + matchId + '_awayOdds');

  var homeOdds = (homeEl && parseFloat(homeEl.value)) || 1;
  var drawOdds = (drawEl && parseFloat(drawEl.value)) || 0;
  var awayOdds = (awayEl && parseFloat(awayEl.value)) || 1;

  var data = {};
  data[matchId] = {
    handicapHomeOdds: homeOdds,
    handicapDrawOdds: drawOdds,
    handicapAwayOdds: awayOdds
  };
  fetch(API_BASE + '/api/admin/handicap-odds', {
    method: 'POST',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify(data)
  }).then(function(r) { return r.json(); }).then(function() {
    // 更新内存中的比赛数据
    for (var i = 0; i < matchesData.length; i++) {
      if (matchesData[i].id === matchId) {
        matchesData[i]._handicapOdds = {homeOdds: homeOdds, drawOdds: drawOdds, awayOdds: awayOdds};
        break;
      }
    }
    if (currentMatchId === matchId) { selectMatch(matchId); }
  }).catch(function(e) { console.error('Save handicap odds error:', e); });
}

/* ===================================================================
 *  初始化
 * =================================================================== */
/* ===================================================================
 *  赔率编辑功能
 * =================================================================== */
var editMode = false;

function toggleEditOdds() {
  editMode = !editMode;
  var btn = document.getElementById('editOddsBtn');
  if (editMode) {
    btn.textContent = '✅ 完成编辑';
    btn.style.background = 'var(--emerald-500)';
    btn.style.color = '#fff';
    btn.style.borderColor = 'var(--emerald-500)';
  } else {
    btn.textContent = '✏️ 编辑赔率';
    btn.style.background = 'var(--slate-700)';
    btn.style.color = 'var(--slate-400)';
    btn.style.borderColor = 'var(--slate-600)';
  }
  // 重新渲染比赛列表 + 当前选中比赛的详情
  renderMatchList(matchesData);
  if (currentMatchId) { selectMatch(currentMatchId); }
}

function saveOddsForMatch(matchId, homeOdds, drawOdds, awayOdds, handicap) {
  var data = {};
  data[matchId] = {
    homeOdds: parseFloat(homeOdds),
    drawOdds: parseFloat(drawOdds),
    awayOdds: parseFloat(awayOdds),
    handicap: handicap || ''
  };
  fetch(API_BASE + '/api/admin/odds', {
    method: 'POST',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify(data)
  }).then(function(r) { return r.json(); })
    .then(function() {
      // 更新内存中的比赛数据
      for (var i = 0; i < matchesData.length; i++) {
        if (matchesData[i].id === matchId) {
          matchesData[i].homeOdds = parseFloat(homeOdds);
          matchesData[i].drawOdds = parseFloat(drawOdds);
          matchesData[i].awayOdds = parseFloat(awayOdds);
          matchesData[i].handicap = handicap || matchesData[i].handicap;
          break;
        }
      }
    })
    .catch(function(e) { console.error('Save odds failed:', e); });
}

function onOddsChange(matchId) {
  var homeOdds = document.getElementById('eoh' + matchId).value;
  var drawOdds = document.getElementById('eod' + matchId).value;
  var awayOdds = document.getElementById('eoa' + matchId).value;
  var handicap = document.getElementById('eop' + matchId).value;
  saveOddsForMatch(matchId, homeOdds, drawOdds, awayOdds, handicap);
  // 如果当前选中这场比赛，刷新详情
  if (currentMatchId === matchId) {
    selectMatch(matchId);
  }
}

function refreshMatches() {
  var listEl = el('matchList');
  listEl.innerHTML = '<div class="loading-wrap"><div class="spinner"></div></div>';

  fetchData('/api/matches').then(function(data) {
    matchesData = data;
    renderMatchList(matchesData);
    if (currentMatchId) {
      var found = false;
      for (var i = 0; i < matchesData.length; i++) {
        if (matchesData[i].id === currentMatchId) { found = true; break; }
      }
      if (found) selectMatch(currentMatchId);
    }
  }).catch(function(err) {
    listEl.innerHTML = '<div style="text-align:center;padding:32px;color:#f87171;">加载失败: ' + err.message + '<br><button onclick="refreshMatches()" style="margin-top:8px;color:#34d399;text-decoration:underline;background:none;border:none;cursor:pointer;font-size:13px;">重试</button></div>';
  });
}

// 页面加载时自动抓取数据
refreshMatches();

setTimeout(function() {
  if (typeof Chart === 'undefined') {
    var banner = document.createElement('div');
    banner.className = 'cdn-error-banner';
    banner.innerHTML = '⚠️ Chart.js 未加载成功，AI预测图表将无法显示。请将 Chart.js 脚本下载到本地并修改 script src 路径。';
    document.body.appendChild(banner);
  }
}, 5000);
</script>
